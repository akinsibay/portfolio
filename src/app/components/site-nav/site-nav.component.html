<header class="nav-wrap">
  <nav class="nav" aria-label="Primary">
    <a class="brand" href="#top" aria-label="Go to top">Akın Şibay</a>

    <ul class="nav-links">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" [class.cv-button]="link.isCta" [attr.target]="link.external ? '_blank' : null" [attr.rel]="link.external ? 'noreferrer' : null">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>
  </nav>
</header>
